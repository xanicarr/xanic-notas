<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Xanic · Notas</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400;700&family=Montserrat:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --teal-dark:  #2b4255;
    --teal:       #365d6c;
    --teal-light: #7aa5c8;
    --cream:      #fff6f1;
    --cream-dark: #f0e8e2;
    --cream-mid:  #e8ddd6;
    --text:       #2b4255;
    --text-soft:  #5a7a8a;
    --text-muted: #9ab0bc;
    --white:      #ffffff;
    --gold:       #d4b896;
    --danger:     #c0555a;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: var(--cream);
    color: var(--text);
    font-family: 'Lato', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  /* Header */
  header {
    position: relative;
    z-index: 10;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 28px;
    background: var(--teal-dark);
    box-shadow: 0 2px 16px rgba(43,66,85,0.2);
  }
  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .logo-img {
    width: 44px;
    height: 44px;
    object-fit: contain;
    mix-blend-mode: screen;
    filter: brightness(1.15);
  }
  .logo-text { display: flex; flex-direction: column; line-height:1; }
  .logo-name {
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    font-style: italic;
    color: var(--gold);
    letter-spacing: 0.03em;
  }
  .logo-tagline {
    font-family: 'Montserrat', sans-serif;
    font-size: 9px;
    color: var(--teal-light);
    letter-spacing: 0.18em;
    text-transform: uppercase;
    margin-top: 2px;
  }
  .header-actions { display:flex; align-items:center; gap:8px; }
  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 7px 16px; border-radius: 20px;
    font-family: 'Montserrat', sans-serif; font-size: 11px;
    font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase;
    cursor: pointer; border: 1.5px solid transparent; transition: all 0.2s ease;
  }
  .btn-ghost { background: rgba(255,255,255,0.08); border-color: rgba(122,165,200,0.4); color: var(--teal-light); }
  .btn-ghost:hover { background: rgba(255,255,255,0.14); border-color: var(--teal-light); color:#fff; }
  .btn-danger { background: transparent; border-color: rgba(192,85,90,0.4); color: #e08a8e; }
  .btn-danger:hover { background: rgba(192,85,90,0.15); border-color:#e08a8e; }
  .btn-primary { background: var(--gold); border-color: var(--gold); color: var(--teal-dark); }
  .btn-primary:hover { background:#c8a87e; transform:translateY(-1px); box-shadow:0 4px 12px rgba(212,184,150,0.3); }

  /* Layout */
  .app { position:relative; z-index:1; display:flex; flex:1; height:calc(100vh - 64px); }

  /* Sidebar */
  .sidebar {
    width:270px; min-width:270px;
    background:var(--white);
    border-right:1px solid var(--cream-mid);
    display:flex; flex-direction:column;
    box-shadow: 2px 0 12px rgba(43,66,85,0.06);
  }
  .sidebar-top { padding:16px; border-bottom:1px solid var(--cream-mid); background:var(--cream); }
  .new-note-btn {
    width:100%; padding:11px;
    background:var(--teal); border:none; border-radius:10px;
    color:#fff; font-family:'Montserrat',sans-serif; font-size:11px;
    font-weight:600; letter-spacing:0.1em; text-transform:uppercase;
    cursor:pointer; display:flex; align-items:center; justify-content:center; gap:8px;
    transition:all 0.2s; box-shadow:0 3px 10px rgba(54,93,108,0.25);
  }
  .new-note-btn:hover { background:var(--teal-dark); transform:translateY(-1px); box-shadow:0 5px 14px rgba(43,66,85,0.3); }
  .sidebar-label {
    padding:14px 16px 6px;
    font-family:'Montserrat',sans-serif; font-size:9px;
    font-weight:600; letter-spacing:0.18em; text-transform:uppercase; color:var(--text-muted);
  }
  .notes-list { flex:1; overflow-y:auto; padding:6px 10px 10px; }
  .notes-list::-webkit-scrollbar { width:3px; }
  .notes-list::-webkit-scrollbar-thumb { background:var(--cream-mid); border-radius:2px; }
  .note-item {
    padding:12px 14px; border-radius:10px; cursor:pointer;
    margin-bottom:4px; border:1.5px solid transparent;
    transition:all 0.18s; position:relative; overflow:hidden;
    animation:slideIn 0.22s ease;
  }
  .note-item:hover { background:var(--cream); border-color:var(--cream-mid); }
  .note-item.active {
    background:linear-gradient(135deg,rgba(54,93,108,0.07),rgba(122,165,200,0.1));
    border-color:var(--teal-light);
  }
  .note-item.active::before {
    content:''; position:absolute; left:0; top:0; bottom:0;
    width:3px; background:var(--teal); border-radius:0 2px 2px 0;
  }
  .note-title { font-family:'Montserrat',sans-serif; font-size:12px; font-weight:600; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-bottom:4px; }
  .note-preview { font-size:11px; color:var(--text-soft); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .note-date { font-size:9px; color:var(--text-muted); margin-top:6px; font-family:'Montserrat',sans-serif; }
  .empty-list { text-align:center; padding:40px 16px; color:var(--text-muted); font-size:12px; line-height:1.9; }
  .empty-list span { font-size:28px; display:block; margin-bottom:10px; opacity:0.4; }

  /* Editor */
  .editor-area { flex:1; display:flex; flex-direction:column; overflow:hidden; background:var(--cream); }
  .editor-toolbar {
    padding:10px 24px; border-bottom:1px solid var(--cream-mid);
    display:flex; align-items:center; gap:4px;
    background:var(--white); box-shadow:0 1px 6px rgba(43,66,85,0.05);
  }
  .toolbar-sep { width:1px; height:18px; background:var(--cream-mid); margin:0 6px; }
  .tool-btn {
    width:30px; height:30px; border:none; background:transparent;
    color:var(--text-soft); border-radius:6px; cursor:pointer;
    font-size:13px; display:flex; align-items:center; justify-content:center;
    transition:all 0.15s; font-family:'Lato',sans-serif;
  }
  .tool-btn:hover { background:var(--cream); color:var(--teal); }
  .word-count { margin-left:auto; font-family:'Montserrat',sans-serif; font-size:10px; color:var(--text-muted); letter-spacing:0.06em; }
  .title-input {
    padding:28px 32px 14px;
    font-family:'Playfair Display',serif; font-size:30px; font-weight:700;
    color:var(--teal-dark); background:transparent; border:none; outline:none;
    width:100%; border-bottom:1px solid var(--cream-mid);
  }
  .title-input::placeholder { color:var(--text-muted); font-style:italic; font-weight:400; }
  .content-input {
    flex:1; padding:22px 32px;
    font-family:'Lato',sans-serif; font-size:15px; line-height:1.85;
    color:var(--text); background:transparent; border:none; outline:none;
    resize:none; width:100%;
  }
  .content-input::placeholder { color:var(--text-muted); }

  /* Empty state */
  .empty-state {
    flex:1; display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:18px; color:var(--text-muted);
  }
  .empty-logo {
    width:90px; opacity:0.18;
    mix-blend-mode: multiply;
    filter: hue-rotate(0deg) saturate(0.5);
  }
  .empty-state p { font-family:'Montserrat',sans-serif; font-size:12px; letter-spacing:0.1em; text-transform:uppercase; text-align:center; line-height:1.9; }

  /* Status bar */
  .status-bar {
    position:relative; z-index:10; padding:7px 28px;
    border-top:1px solid var(--cream-mid); display:flex; align-items:center; gap:16px;
    font-family:'Montserrat',sans-serif; font-size:10px; color:var(--text-muted);
    letter-spacing:0.07em; background:var(--white);
  }
  .status-dot { width:6px; height:6px; border-radius:50%; background:var(--teal-light); animation:pulse 2.5s infinite; flex-shrink:0; }

  @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.35;} }
  @keyframes slideIn { from{opacity:0;transform:translateX(-6px);} to{opacity:1;transform:translateX(0);} }
  @keyframes toastIn { from{opacity:0;transform:translateY(8px);} to{opacity:1;transform:translateY(0);} }

  .toast {
    position:fixed; bottom:36px; right:28px;
    background:var(--teal-dark); color:var(--gold);
    padding:10px 20px; border-radius:20px;
    font-family:'Montserrat',sans-serif; font-size:11px; font-weight:600; letter-spacing:0.06em;
    z-index:200; animation:toastIn 0.25s ease; box-shadow:0 6px 20px rgba(43,66,85,0.25);
  }
  #editorWrapper { display:none; flex-direction:column; flex:1; overflow:hidden; }
  #editorWrapper.visible { display:flex; }
</style>
</head>

      <p>Selecciona una nota<br>o crea una nueva</p>
    </div>
    <div id="editorWrapper">
      <div class="editor-toolbar">
        <button class="tool-btn" title="Negrita" onclick="fmt('**','**')"><b>B</b></button>
        <button class="tool-btn" title="Cursiva" onclick="fmt('_','_')"><i>I</i></button>
        <button class="tool-btn" title="Subrayado" onclick="fmt('__','__')"><u>U</u></button>
        <div class="toolbar-sep"></div>
        <button class="tool-btn" title="Lista" onclick="insertList()">☰</button>
        <button class="tool-btn" title="Separador" onclick="insertLine()">—</button>
        <button class="tool-btn" title="Cita" onclick="fmt('> ','')">❝</button>
        <span class="word-count" id="wordCount">0 palabras</span>
      </div>
      <input type="text" class="title-input" id="titleInput" placeholder="Título de la nota…" oninput="updatePreview()">
      <textarea class="content-input" id="contentInput" placeholder="Comienza a escribir aquí… este es tu espacio seguro." oninput="updatePreview(); updateWordCount()"></textarea>
    </div>
  </div>
</div>

<div class="status-bar">
  <div class="status-dot"></div>
  <span id="noteCountStatus">Sin notas</span>
  <span>·</span>
  <span id="savedStatus">Listo</span>
  <span style="margin-left:auto;opacity:0.5;">Ctrl+S para guardar</span>
</div>

<script>
  let notes = JSON.parse(localStorage.getItem('xanic_notes') || '[]');
  let activeId = null;

  function render() {
    const list = document.getElementById('notesList');
    const count = document.getElementById('noteCountStatus');
    if (!notes.length) {
      list.innerHTML = '<div class="empty-list"><span>🌙</span>Aún no hay notas.<br>¡Crea la primera!</div>';
      count.textContent = 'Sin notas'; return;
    }
    count.textContent = notes.length + ' nota' + (notes.length !== 1 ? 's' : '');
    list.innerHTML = notes.map(n => `
      <div class="note-item ${n.id === activeId ? 'active' : ''}" onclick="openNote('${n.id}')">
        <div class="note-title">${escHtml(n.title) || 'Sin título'}</div>
        <div class="note-preview">${escHtml((n.content||'').substring(0,60)) || '…'}</div>
        <div class="note-date">${new Date(n.updated).toLocaleDateString('es-MX',{day:'2-digit',month:'short',year:'numeric'})}</div>
      </div>`).join('');
  }

  function escHtml(t) { return (t||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  function newNote() {
    const id = Date.now().toString();
    notes.unshift({id, title:'', content:'', created:Date.now(), updated:Date.now()});
    persist(); openNote(id);
    setTimeout(()=>document.getElementById('titleInput').focus(), 50);
  }

  function openNote(id) {
    activeId = id;
    const n = notes.find(x=>x.id===id); if(!n) return;
    document.getElementById('emptyState').style.display = 'none';
    document.getElementById('editorWrapper').classList.add('visible');
    document.getElementById('titleInput').value = n.title;
    document.getElementById('contentInput').value = n.content;
    updateWordCount(); render();
  }

  function saveNote() {
    if (!activeId) return;
    const n = notes.find(x=>x.id===activeId); if(!n) return;
    n.title = document.getElementById('titleInput').value;
    n.content = document.getElementById('contentInput').value;
    n.updated = Date.now();
    persist(); render();
    showToast('Nota guardada ✦');
    document.getElementById('savedStatus').textContent = 'Guardado · ' + new Date().toLocaleTimeString('es-MX',{hour:'2-digit',minute:'2-digit'});
  }

  function deleteNote() {
    if (!activeId) return;
    if (!confirm('¿Eliminar esta nota?')) return;
    notes = notes.filter(x=>x.id!==activeId);
    activeId = null; persist();
    document.getElementById('emptyState').style.display = 'flex';
    document.getElementById('editorWrapper').classList.remove('visible');
    render(); showToast('Nota eliminada');
  }

  function updatePreview() {
    if (!activeId) return;
    const n = notes.find(x=>x.id===activeId); if(!n) return;
    n.title = document.getElementById('titleInput').value;
    n.content = document.getElementById('contentInput').value;
    render();
  }

  function updateWordCount() {
    const t = document.getElementById('contentInput').value.trim();
    const w = t ? t.split(/\s+/).length : 0;
    document.getElementById('wordCount').textContent = w + ' palabra' + (w!==1?'s':'');
  }

  function exportNote() {
    if (!activeId) { showToast('Selecciona una nota primero'); return; }
    const n = notes.find(x=>x.id===activeId);
    const blob = new Blob(['# '+n.title+'\n\n'+n.content],{type:'text/plain;charset=utf-8'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = (n.title||'nota') + '.txt';
    a.click(); showToast('Exportada ✓');
  }

  function fmt(before, after) {
    const ta = document.getElementById('contentInput');
    const s = ta.selectionStart, e = ta.selectionEnd;
    const sel = ta.value.substring(s,e);
    ta.value = ta.value.substring(0,s)+before+sel+after+ta.value.substring(e);
    ta.selectionStart = s+before.length; ta.selectionEnd = e+before.length;
    ta.focus(); updateWordCount();
  }

  function insertList() {
    const ta = document.getElementById('contentInput');
    const s = ta.selectionStart, ins='\n• ';
    ta.value = ta.value.substring(0,s)+ins+ta.value.substring(s);
    ta.selectionStart = ta.selectionEnd = s+ins.length; ta.focus();
  }

  function insertLine() {
    const ta = document.getElementById('contentInput');
    const s = ta.selectionStart, ins='\n\n—————\n\n';
    ta.value = ta.value.substring(0,s)+ins+ta.value.substring(s);
    ta.selectionStart = ta.selectionEnd = s+ins.length; ta.focus();
  }

  function persist() { localStorage.setItem('xanic_notes', JSON.stringify(notes)); }

  function showToast(msg) {
    const t = document.createElement('div');
    t.className='toast'; t.textContent=msg;
    document.body.appendChild(t);
    setTimeout(()=>t.remove(), 2400);
  }

  document.addEventListener('keydown', e => {
    if ((e.ctrlKey||e.metaKey) && e.key==='s') { e.preventDefault(); saveNote(); }
  });

  render();
</script>
</body>
